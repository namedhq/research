name: Run ytf sync

on:
  schedule:
    - cron: "0 16 * * 6"
  workflow_dispatch:

jobs:
  run_ytfilter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            ytfbin_sync

      - name: Run application
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: chmod +x ./ytfbin_sync && ./ytfbin_sync
